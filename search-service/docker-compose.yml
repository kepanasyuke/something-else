services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  app:
    build: .
    ports:
      - "8000:8000"
    user: "0:0"  # временно от root
    environment:
      - DATABASE_URL=./data/documents.db
      - ES_HOST=http://elasticsearch:9200
      - CSV_PATH=/data/posts.csv
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

volumes:
  es_data:

networks:
  app-network:
    driver: bridge