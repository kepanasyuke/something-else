<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковый сервис документов</title>
    <style>
        .ent-hub {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 28px;
            max-width: 720px;
            margin: 40px auto;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        }
        .ent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 16px;
        }
        .ent-title-block { display: flex; align-items: center; gap: 12px; }
        .ent-title-block h2 { margin: 0; font-size: 16px; font-weight: 600; color: #0f172a; }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .telemetry-chips { display: flex; gap: 8px; }
        .chip { font-size: 11px; font-family: monospace; padding: 4px 10px; border-radius: 6px; font-weight: 600; background: #f1f5f9; color: #475569; }
        .workspace-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            margin-bottom: 26px;
        }
        .stepper-panel { display: flex; flex-direction: column; gap: 14px; }
        .step-item { display: flex; gap: 14px; padding: 12px; border-radius: 10px; border: 1px solid transparent; transition: all 0.3s ease; }
        .step-item.active { background: #f8fafc; border-color: #e2e8f0; }
        .step-item.done { opacity: 0.5; }
        .step-item.done .step-num { background: #10b981; color: #ffffff; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .step-item.active .step-num { background: #2563eb; color: #ffffff; box-shadow: 0 0 8px rgba(37,99,235,0.4); }
        .step-body { display: flex; flex-direction: column; gap: 2px; }
        .step-t { font-size: 13px; font-weight: 600; color: #1e293b; }
        .step-d { font-size: 11px; color: #64748b; line-height: 1.3; }
        .graph-panel { background: #fafafa; border-radius: 12px; border: 1px solid #f1f5f9; padding: 10px; }
        .hub-svg { width: 100%; overflow: visible; }
        .stream-line { opacity: 0; }
        .search-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .search-input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .action-btn-main {
            width: 100%;
            background: #0f172a;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .action-btn-main:hover { background: #1e293b; }
        .action-btn-main:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .action-btn-main .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: btnSpin 0.6s infinite linear;
            margin: 0 auto;
        }
        .action-btn-main.loading .spinner {
            display: block;
        }
        .action-btn-main.loading .btn-text {
            display: none;
        }
        @keyframes btnSpin { to { transform: rotate(360deg); } }
        .datagrid-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid #f1f5f9;
        }
        .datagrid-panel.open {
            max-height: 600px;
            opacity: 1;
            margin-top: 24px;
            padding-top: 24px;
        }
        .grid-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .grid-header {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .grid-count {
            font-size: 12px;
            color: #64748b;
        }
        .b2b-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
        }
        .b2b-table th {
            color: #475569;
            font-weight: 600;
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .b2b-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            vertical-align: middle;
        }
        .mono-hash { font-family: monospace; font-weight: 600; color: #64748b; }
        .entity-tag {
            background: #eff6ff;
            color: #2563eb;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-family: monospace;
            display: inline-block;
            margin: 2px 4px 2px 0;
        }
        .btn-table-delete {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-table-delete:hover {
            background: #fecaca;
            border-color: #f87171;
        }
        .btn-table-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .processing .stream-line { opacity: 1; }
        .processing .line-top { animation: b2bFlow 0.5s infinite linear; }
        .processing .line-bottom { animation: b2bFlow reverse 0.5s infinite linear; }
        .processing .gear-1c { animation: b2bSpin 2.5s infinite linear; transform-origin: 20px 70px; }
        .processing .central-detector { animation: b2bDetectorMove 3s infinite ease-in-out; }
        .processing .laser-beam { opacity: 1; }
        .processing .led-1 { animation: b2bFlicker 0.3s infinite alternate; }
        .processing .led-2 { animation: b2bFlicker 0.4s infinite alternate 0.1s; }
        .processing .led-3 { animation: b2bFlicker 0.2s infinite alternate 0.15s; }
        @keyframes b2bFlow { to { stroke-dashoffset: -24; } }
        @keyframes b2bSpin { to { transform: rotate(360deg); } }
        @keyframes b2bFlicker { from { opacity: 0.2; } to { opacity: 1; } }
        @keyframes b2bDetectorMove {
            0% { transform: translate(100px, 80px); }
            50% { transform: translate(100px, 65px); filter: drop-shadow(0 6px 12px rgba(37,99,235,0.25)); }
            100% { transform: translate(100px, 80px); }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div id="enterpriseHub" class="ent-hub">
    <div class="ent-header">
        <div class="ent-title-block">
            <div id="hubStatusLed" class="status-indicator online"></div>
            <h2>Поисковый сервис документов</h2>
        </div>
        <div class="telemetry-chips">
            <span id="protocolBadge" class="chip">REST API</span>
            <span id="netLatency" class="chip telemetry-neutral">Отклик: 0мс</span>
        </div>
    </div>

    <div class="workspace-grid">
        <div class="stepper-panel">
            <div class="step-item active" id="step1">
                <div class="step-num">1</div>
                <div class="step-body">
                    <span class="step-t">Поиск</span>
                    <span class="step-d">Отправка запроса в Elasticsearch</span>
                </div>
            </div>
            <div class="step-item" id="step2">
                <div class="step-num">2</div>
                <div class="step-body">
                    <span class="step-t">Загрузка</span>
                    <span class="step-d">Получение документов из БД</span>
                </div>
            </div>
            <div class="step-item" id="step3">
                <div class="step-num">3</div>
                <div class="step-body">
                    <span class="step-t">Готово</span>
                    <span class="step-d">Сортировка и вывод результатов</span>
                </div>
            </div>
        </div>

        <div class="graph-panel">
            <svg xmlns="http://w3.org" viewBox="0 0 200 160" class="hub-svg">
                <defs>
                    <pattern id="hubGrid" width="10" height="10" patternUnits="userSpaceOnUse">
                        <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5"/>
                    </pattern>
                    <linearGradient id="laserGlow" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#hubGrid)" rx="10"/>
                <path d="M 40 45 Q 100 10 160 45" stroke="#e2e8f0" stroke-width="2.5" fill="none" id="mainPathTop"/>
                <path d="M 40 45 Q 100 10 160 45" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-dasharray="6 6" class="stream-line line-top"/>
                <path d="M 40 115 Q 100 150 160 115" stroke="#e2e8f0" stroke-width="2.5" fill="none" id="mainPathBottom"/>
                <path d="M 40 115 Q 100 150 160 115" stroke="#10b981" stroke-width="2.5" fill="none" stroke-dasharray="6 6" class="stream-line line-bottom"/>
                <g class="hub-node node-1c" transform="translate(15, 30)">
                    <rect width="40" height="100" rx="8" fill="#f59e0b" class="node-box"/>
                    <rect x="6" y="12" width="28" height="5" rx="1.5" fill="#ffffff" opacity="0.35"/>
                    <rect x="6" y="24" width="28" height="5" rx="1.5" fill="#ffffff" opacity="0.35"/>
                    <circle cx="20" cy="70" r="14" stroke="#ffffff" stroke-width="2" fill="none" stroke-dasharray="5 3" class="gear-1c"/>
                    <circle cx="20" cy="70" r="4" fill="#ffffff" opacity="0.8"/>
                </g>
                <g class="hub-node node-cloud" transform="translate(145, 30)">
                    <rect width="40" height="100" rx="10" fill="#2563eb" class="node-box"/>
                    <line x1="8" y1="16" x2="32" y2="16" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" class="led-1"/>
                    <line x1="8" y1="28" x2="32" y2="28" stroke="#34d399" stroke-width="3.5" stroke-linecap="round" class="led-2"/>
                    <line x1="8" y1="40" x2="32" y2="40" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" class="led-3"/>
                    <circle cx="20" cy="75" r="8" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.3"/>
                </g>
                <g class="central-detector" transform="translate(100, 80)">
                    <path d="M 0 0 L -15 35 L 15 35 Z" fill="url(#laserGlow)" opacity="0" class="laser-beam" />
                    <circle cx="0" cy="0" r="16" stroke="#2563eb" stroke-width="4" fill="#ffffff" class="lens-body"/>
                    <line x1="11" y1="11" x2="24" y2="24" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
                    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ef4444" stroke-width="2" class="lens-target"/>
                </g>
            </svg>
        </div>
    </div>

    <div class="search-input-group">
        <input type="text" id="searchQuery" placeholder="Введите поисковый запрос..." value="политика">
        <button id="hubActionBtn" class="action-btn-main">
            <span class="btn-text">Инициировать поиск</span>
            <span class="spinner"></span>
        </button>
    </div>

    <div id="dataGridResult" class="datagrid-panel">
        <div class="grid-toolbar">
            <span class="grid-header">Найденные документы</span>
            <span class="grid-count" id="resultCount">0 записей</span>
        </div>
        <div id="resultContainer">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <p>Введите запрос и нажмите «Инициировать поиск»</p>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const API_BASE = 'http://localhost:8000';
        const hub = document.getElementById('enterpriseHub');
        const btn = document.getElementById('hubActionBtn');
        const grid = document.getElementById('dataGridResult');
        const resultContainer = document.getElementById('resultContainer');
        const resultCount = document.getElementById('resultCount');
        const searchInput = document.getElementById('searchQuery');
        const statusLed = document.getElementById('hubStatusLed');
        const latencyBadge = document.getElementById('netLatency');
        const steps = [
            document.getElementById('step1'),
            document.getElementById('step2'),
            document.getElementById('step3')
        ];
        let pipelineTimeout;

        function updateTelemetry(processing) {
            if (processing) {
                const ping = Math.floor(Math.random() * 35) + 50;
                latencyBadge.textContent = `Отклик: ${ping}мс`;
                latencyBadge.className = "chip telemetry-neutral";
                statusLed.className = "status-indicator online";
            } else {
                const ping = Math.floor(Math.random() * 5) + 11;
                latencyBadge.textContent = `Отклик: ${ping}мс`;
                latencyBadge.className = "chip telemetry-neutral";
                statusLed.className = "status-indicator online";
            }
        }

        async function performSearch(query) {
            if (!query.trim()) {
                alert('Введите поисковый запрос');
                return;
            }
            btn.disabled = true;
            btn.classList.add('loading');
            hub.classList.add('processing');
            grid.classList.remove('open');
            steps[0].className = "step-item active";
            steps[1].className = "step-item";
            steps[2].className = "step-item";
            clearTimeout(pipelineTimeout);
            pipelineTimeout = setTimeout(() => {
                steps[0].className = "step-item done";
                steps[1].className = "step-item active";
            }, 1000);
            try {
                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query.trim() })
                });
                if (!response.ok) throw new Error(`Ошибка ${response.status}: ${response.statusText}`);
                const data = await response.json();
                const documents = data.results || [];
                clearTimeout(pipelineTimeout);
                pipelineTimeout = setTimeout(() => {
                    steps[1].className = "step-item done";
                    steps[2].className = "step-item active";
                }, 800);
                setTimeout(() => {
                    renderResults(documents);
                    steps[2].className = "step-item done";
                    grid.classList.add('open');
                    hub.classList.remove('processing');
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    updateTelemetry(false);
                }, 600);
            } catch (error) {
                console.error('Ошибка поиска:', error);
                alert('Не удалось выполнить поиск. Проверьте, запущен ли бэкенд.');
                hub.classList.remove('processing');
                btn.disabled = false;
                btn.classList.remove('loading');
                steps.forEach(s => s.className = "step-item");
                steps[0].className = "step-item active";
            }
        }

        function renderResults(docs) {
            resultContainer.innerHTML = '';
            resultCount.textContent = `${docs.length} записей`;
            if (!docs.length) {
                resultContainer.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>Ничего не найдено</p>
                    </div>
                `;
                return;
            }
            const table = document.createElement('table');
            table.className = 'b2b-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Рубрики</th>
                        <th>Текст</th>
                        <th>Дата</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            `;
            resultContainer.appendChild(table);
            const tbody = table.querySelector('#tableBody');
            docs.forEach(doc => {
                const tr = document.createElement('tr');
                tr.dataset.id = doc.id;
                const rubricsHtml = doc.rubrics.map(r => `<span class="entity-tag">${r}</span>`).join(' ');
                tr.innerHTML = `
                    <td class="mono-hash">${doc.id}</td>
                    <td>${rubricsHtml}</td>
                    <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${doc.text}">${doc.text}</td>
                    <td>${new Date(doc.created_date).toLocaleString()}</td>
                    <td><button class="btn-table-delete" data-id="${doc.id}">Удалить</button></td>
                `;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.btn-table-delete').forEach(btnDelete => {
                btnDelete.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    if (!confirm(`Удалить документ ID ${id}?`)) return;
                    this.disabled = true;
                    this.textContent = '...';
                    try {
                        const resp = await fetch(`${API_BASE}/documents/${id}`, { method: 'DELETE' });
                        if (!resp.ok) throw new Error(`Ошибка ${resp.status}`);
                        const tr = this.closest('tr');
                        tr.style.opacity = '0.3';
                        setTimeout(() => tr.remove(), 300);
                        const remaining = document.querySelectorAll('#tableBody tr').length;
                        resultCount.textContent = `${remaining} записей`;
                    } catch (err) {
                        console.error('Ошибка удаления:', err);
                        alert('Не удалось удалить документ.');
                        this.disabled = false;
                        this.textContent = 'Удалить';
                    }
                });
            });
        }

        btn.addEventListener('click', () => performSearch(searchInput.value));
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                btn.click();
            }
        });

        async function checkHealth() {
            try {
                const resp = await fetch(`${API_BASE}/health`);
                if (resp.ok) {
                    statusLed.className = 'status-indicator online';
                    latencyBadge.textContent = 'Отклик: 12мс';
                }
            } catch (e) {
                console.warn('Бэкенд недоступен');
                statusLed.className = 'status-indicator warning';
                latencyBadge.textContent = 'Offline';
            }
        }
        checkHealth();
        setInterval(updateTelemetry, 2000);
        if (searchInput.value.trim()) {
            setTimeout(() => btn.click(), 500);
        }
    })();
</script>
</body>
</html>
