<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковый сервис документов</title>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * { box-sizing: border-box; }
        body { margin: 0; background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; }
        .ent-hub {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 28px;
            max-width: 720px;
            margin: 40px auto;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
        }
        /* ===== ШАПКА ===== */
        .ent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ent-title-block { display: flex; align-items: center; gap: 12px; }
        .ent-title-block h2 { margin: 0; font-size: 16px; font-weight: 600; color: #0f172a; }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-indicator.warning { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
        .status-indicator.offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .telemetry-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .chip {
            font-size: 11px;
            font-family: monospace;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            background: #f1f5f9;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* ===== ДЖАЗ-КОНТРОЛЛЕР ===== */
        .jazz-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .jazz-btn:hover { background: #f1f5f9; color: #1e293b; }
        .jazz-icon-svg { width: 14px; height: 14px; overflow: visible; }
        .wave-bar { transform-origin: center; opacity: 0.3; }
        .jazz-btn.music-playing { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
        .music-playing .wave-bar { opacity: 1; }
        .music-playing .bar-1 { animation: j-wave 0.5s infinite alternate ease-in-out; }
        .music-playing .bar-2 { animation: j-wave 0.3s infinite alternate 0.1s ease-in-out; }
        .music-playing .bar-3 { animation: j-wave 0.4s infinite alternate 0.15s ease-in-out; }
        @keyframes j-wave { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1.4); } }
        /* ===== ПОЛЯ ВВОДА ===== */
        .search-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .search-input-group input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .search-input-group input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .action-btn-main {
            width: 100%;
            background: #0f172a;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            white-space: nowrap;
        }
        .action-btn-main:hover { background: #1e293b; }
        .action-btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        .action-btn-main .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: btnSpin 0.6s infinite linear;
            margin: 0 auto;
        }
        .action-btn-main.loading .spinner { display: block; }
        .action-btn-main.loading .btn-text { display: none; }
        @keyframes btnSpin { to { transform: rotate(360deg); } }
        /* ===== СТЕППЕР ===== */
        .workspace-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            margin-bottom: 26px;
        }
        .stepper-panel { display: flex; flex-direction: column; gap: 14px; }
        .step-item { display: flex; gap: 14px; padding: 12px; border-radius: 10px; border: 1px solid transparent; transition: all 0.3s ease; }
        .step-item.active { background: #f8fafc; border-color: #e2e8f0; }
        .step-item.done { opacity: 0.5; }
        .step-item.done .step-num { background: #10b981; color: #ffffff; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .step-item.active .step-num { background: #2563eb; color: #ffffff; box-shadow: 0 0 8px rgba(37,99,235,0.4); }
        .step-body { display: flex; flex-direction: column; gap: 2px; }
        .step-t { font-size: 13px; font-weight: 600; color: #1e293b; }
        .step-d { font-size: 11px; color: #64748b; line-height: 1.3; }
        /* ===== ГРАФИК ===== */
        .graph-panel { background: #fafafa; border-radius: 12px; border: 1px solid #f1f5f9; padding: 10px; }
        .hub-svg { width: 100%; overflow: visible; }
        .stream-line { opacity: 0; }
        .processing .stream-line { opacity: 1; }
        .processing .line-top { animation: b2bFlow 0.5s infinite linear; }
        .processing .line-bottom { animation: b2bFlow reverse 0.5s infinite linear; }
        .processing .gear-1c { animation: b2bSpin 2.5s infinite linear; transform-origin: 20px 70px; }
        .processing .central-detector { animation: b2bDetectorMove 3s infinite ease-in-out; }
        .processing .laser-beam { opacity: 1; }
        .processing .led-1 { animation: b2bFlicker 0.3s infinite alternate; }
        .processing .led-2 { animation: b2bFlicker 0.4s infinite alternate 0.1s; }
        .processing .led-3 { animation: b2bFlicker 0.2s infinite alternate 0.15s; }
        @keyframes b2bFlow { to { stroke-dashoffset: -24; } }
        @keyframes b2bSpin { to { transform: rotate(360deg); } }
        @keyframes b2bFlicker { from { opacity: 0.2; } to { opacity: 1; } }
        @keyframes b2bDetectorMove {
            0% { transform: translate(100px, 80px); }
            50% { transform: translate(100px, 65px); filter: drop-shadow(0 6px 12px rgba(37,99,235,0.25)); }
            100% { transform: translate(100px, 80px); }
        }
        /* ===== ТАБЛИЦА ===== */
        .datagrid-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid #f1f5f9;
        }
        .datagrid-panel.open {
            max-height: 600px;
            opacity: 1;
            margin-top: 24px;
            padding-top: 24px;
        }
        .grid-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .grid-header {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .grid-count { font-size: 12px; color: #64748b; }
        .b2b-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        .b2b-table th {
            color: #475569;
            font-weight: 600;
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .b2b-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            vertical-align: middle;
        }
        .mono-hash { font-family: monospace; font-weight: 600; color: #64748b; }
        .entity-tag {
            background: #eff6ff;
            color: #2563eb;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-family: monospace;
            display: inline-block;
            margin: 2px 4px 2px 0;
        }
        .btn-table-delete {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #ef4444;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-table-delete:hover { background: #fca5a5; color: #b91c1c; }
        .btn-export {
            background: #2563eb;
            border: none;
            color: #ffffff;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-export:hover { background: #1d4ed8; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
        @media (max-width: 600px) {
            .workspace-grid { grid-template-columns: 1fr; }
            .ent-header { flex-direction: column; align-items: stretch; gap: 10px; }
            .telemetry-chips { flex-wrap: wrap; }
            .row { flex-wrap: wrap; }
            .action-btn-main { width: 100%; }
        }
    </style>
</head>
<body>

<div id="enterpriseHub" class="ent-hub">
    <!-- ШАПКА -->
    <div class="ent-header">
        <div class="ent-title-block">
            <div id="hubStatusLed" class="status-indicator online"></div>
            <h2>Поисковый хаб: FastAPI Engine</h2>
        </div>
        <div class="telemetry-chips">
            <button id="jazzToggleBtn" class="jazz-btn" title="Включить фоновый джаз для ожидания">
                <svg xmlns="http://w3.org" viewBox="0 0 24 24" class="jazz-icon-svg">
                    <path d="M5 9v6h4l5 5V4L9 9H5z" fill="currentColor"/>
                    <g class="sound-waves">
                        <line x1="16" y1="10" x2="16" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar bar-1"/>
                        <line x1="19" y1="7" x2="19" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar bar-2"/>
                        <line x1="22" y1="9" x2="22" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar bar-3"/>
                    </g>
                </svg>
                <span id="jazzStatusText">Джаз: Выкл</span>
            </button>
            <span id="netLatency" class="chip telemetry-neutral">API Пинг: --</span>
        </div>
    </div>

    <!-- ПОЛЯ ВВОДА -->
    <div class="search-input-group">
        <div class="row">
            <input type="text" id="searchInput" placeholder="Введите поисковый запрос (например: политика)..." autocomplete="off">
        </div>
    </div>

    <!-- СТЕППЕР + ГРАФИК -->
    <div class="workspace-grid">
        <div class="stepper-panel">
            <div class="step-item" id="step1">
                <div class="step-num">1</div>
                <div class="step-body">
                    <span class="step-t">HTTP Request</span>
                    <span class="step-d">Отправка POST-запроса на бэкенд FastAPI</span>
                </div>
            </div>
            <div class="step-item" id="step2">
                <div class="step-num">2</div>
                <div class="step-body">
                    <span class="step-t">Elasticsearch Query</span>
                    <span class="step-d">Поиск совпадений по тексту документов</span>
                </div>
            </div>
            <div class="step-item" id="step3">
                <div class="step-num">3</div>
                <div class="step-body">
                    <span class="step-t">Data Hydration</span>
                    <span class="step-d">Сборка и валидация схемы ответа</span>
                </div>
            </div>
        </div>

        <div class="graph-panel">
            <svg xmlns="http://w3.org" viewBox="0 0 200 160" class="hub-svg">
                <defs>
                    <pattern id="hubGrid" width="10" height="10" patternUnits="userSpaceOnUse">
                        <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5"/>
                    </pattern>
                    <linearGradient id="laserGlow" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#hubGrid)" rx="10"/>
                <path d="M 40 45 Q 100 10 160 45" stroke="#e2e8f0" stroke-width="2.5" fill="none" id="mainPathTop"/>
                <path d="M 40 45 Q 100 10 160 45" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-dasharray="6 6" class="stream-line line-top"/>
                <path d="M 40 115 Q 100 150 160 115" stroke="#e2e8f0" stroke-width="2.5" fill="none" id="mainPathBottom"/>
                <path d="M 40 115 Q 100 150 160 115" stroke="#10b981" stroke-width="2.5" fill="none" stroke-dasharray="6 6" class="stream-line line-bottom"/>
                <g class="hub-node" transform="translate(15, 30)">
                    <rect width="40" height="100" rx="8" fill="#f59e0b"/>
                    <circle cx="20" cy="70" r="14" stroke="#ffffff" stroke-width="2" fill="none" stroke-dasharray="5 3" class="gear-1c"/>
                    <circle cx="20" cy="70" r="4" fill="#ffffff"/>
                </g>
                <g class="hub-node" transform="translate(145, 30)">
                    <rect width="40" height="100" rx="10" fill="#2563eb"/>
                    <line x1="8" y1="16" x2="32" y2="16" stroke="#60a5fa" stroke-width="3.5" class="led-1"/>
                    <line x1="8" y1="28" x2="32" y2="28" stroke="#34d399" stroke-width="3.5" class="led-2"/>
                </g>
                <g class="central-detector" transform="translate(100, 80)">
                    <path d="M 0 0 L -15 35 L 15 35 Z" fill="url(#laserGlow)" opacity="0" class="laser-beam" />
                    <circle cx="0" cy="0" r="16" stroke="#2563eb" stroke-width="4" fill="#ffffff" class="lens-body"/>
                    <line x1="11" y1="11" x2="24" y2="24" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
                    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ef4444" stroke-width="2" class="lens-target"/>
                </g>
            </svg>
        </div>
    </div>

    <!-- КНОПКА ПОИСКА -->
    <div class="control-console">
        <button id="hubActionBtn" class="action-btn-main">
            <span class="btn-text">Инициировать сквозной поиск</span>
            <div class="spinner"></div>
        </button>
    </div>

    <!-- ТАБЛИЦА РЕЗУЛЬТАТОВ -->
    <div id="dataGridResult" class="datagrid-panel">
        <div class="grid-toolbar">
            <span class="grid-header">Документы, найденные в репозитории</span>
            <div class="export-actions">
                <button onclick="triggerExport('XLSX')" class="btn-export">Выгрузить в .XLSX</button>
            </div>
        </div>
        <table class="b2b-table">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th>Рубрики</th>
                    <th>Текст документа</th>
                    <th style="width: 90px; text-align: right;">Управление</th>
                </tr>
            </thead>
            <tbody id="documentsTableBody">
                <!-- Динамически -->
            </tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const hub = document.getElementById('enterpriseHub');
        const searchBtn = document.getElementById('hubActionBtn');
        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('documentsTableBody');
        const gridResult = document.getElementById('dataGridResult');
        const latencyBadge = document.getElementById('netLatency');
        const statusLed = document.getElementById('hubStatusLed');

        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');

        const jazzBtn = document.getElementById('jazzToggleBtn');
        const jazzText = document.getElementById('jazzStatusText');

        // ========== ДЖАЗ (WEB AUDIO API) ==========
        let audioCtx = null;
        let isMusicActive = false;
        let isUserWantsMusic = false;
        let musicIntervalId = null;
        let currentMusicStep = 0;
        let biquadFilter = null;

        const chords = [[53, 57, 60, 64], [50, 53, 57, 60], [55, 59, 62, 65], [48, 52, 55, 59]];

        function createTone(freq, type, duration, startTime, volume) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.04);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.connect(gainNode);
            gainNode.connect(biquadFilter);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function playMusicStep() {
            const sTime = audioCtx.currentTime + 0.02;
            const chord = chords[Math.floor(currentMusicStep / 16) % chords.length];
            const step = currentMusicStep % 16;

            if (step % 4 === 0) {
                const bNote = 440 * Math.pow(2, ((chord[0] - 24) - 69) / 12);
                createTone(bNote, 'triangle', 0.35, sTime, 0.25);
            }
            if (step === 2 || step === 8) {
                chord.forEach((n, i) => {
                    const f = 440 * Math.pow(2, (n - 69) / 12);
                    createTone(f, 'sine', 0.6, sTime + (i * 0.02), 0.02);
                });
            }
            currentMusicStep++;
        }

        function startJazzSound() {
            if (isMusicActive || !isUserWantsMusic) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "lowpass";
                biquadFilter.frequency.setValueAtTime(1100, audioCtx.currentTime);
                biquadFilter.connect(audioCtx.destination);
            }
            musicIntervalId = setInterval(playMusicStep, 150);
            isMusicActive = true;
        }

        function stopJazzSound() {
            if (!isMusicActive) return;
            clearInterval(musicIntervalId);
            isMusicActive = false;
        }

        // Обработчик кнопки джаза: включает/выключает музыку всегда, независимо от поиска
        jazzBtn.addEventListener('click', () => {
            isUserWantsMusic = !isUserWantsMusic;
            if (isUserWantsMusic) {
                jazzBtn.classList.add('music-playing');
                jazzText.textContent = "Джаз: Вкл";
                startJazzSound();
            } else {
                jazzBtn.classList.remove('music-playing');
                jazzText.textContent = "Джаз: Выкл";
                stopJazzSound();
            }
        });

        // ========== ОСНОВНАЯ ФУНКЦИЯ ПОИСКА ==========
        async function executeFastAPISearch() {
            const queryText = searchInput.value.trim();

            if (!queryText) {
                alert("Пожалуйста, введите поисковый запрос.");
                return;
            }

            searchBtn.disabled = true;
            searchBtn.classList.add('loading');
            hub.classList.add('processing');

            step1.className = "step-item active";
            step2.className = "step-item";
            step3.className = "step-item";

            const startTime = performance.now();

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryText })
                });

                if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);

                step1.className = "step-item done";
                step2.className = "step-item active";

                const data = await response.json();
                const documents = data.results || [];

                step2.className = "step-item done";
                step3.className = "step-item active";

                renderFetchedDocuments(documents);

                const duration = Math.round(performance.now() - startTime);
                latencyBadge.textContent = `API Ответ: ${duration}мс`;
                statusLed.className = "status-indicator online";

            } catch (error) {
                console.error("Критический сбой синхронизации:", error);
                alert(`Не удалось связаться с FastAPI. Проверьте, что сервер запущен.`);
                latencyBadge.textContent = `API: Сбой`;
                statusLed.className = "status-indicator offline";
            } finally {
                searchBtn.disabled = false;
                searchBtn.classList.remove('loading');
                hub.classList.remove('processing');
                step3.className = "step-item done";
            }
        }

        // ========== ОТРИСОВКА ТАБЛИЦЫ ==========
        function renderFetchedDocuments(docs) {
            tableBody.innerHTML = "";

            if (!docs || docs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #64748b; padding: 20px;">Документы по запросу не найдены</td></tr>`;
                gridResult.classList.add('open');
                return;
            }

            docs.forEach(doc => {
                const tr = document.createElement('tr');

                let rubricsHtml = "";
                if (Array.isArray(doc.rubrics)) {
                    doc.rubrics.forEach(r => rubricsHtml += `<span class="entity-tag">${r}</span>`);
                } else if (doc.rubrics) {
                    rubricsHtml = `<span class="entity-tag">${doc.rubrics}</span>`;
                }

                tr.innerHTML = `
                    <td class="mono-hash">${doc.id || '--'}</td>
                    <td>${rubricsHtml || '—'}</td>
                    <td style="max-width: 340px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${doc.text || ''}">
                        ${doc.text || ''}
                    </td>
                    <td style="text-align: right;">
                        <button onclick="window.deleteDocumentById(${doc.id}, this)" class="btn-table-delete">Удалить</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            gridResult.classList.add('open');
        }

        // ========== УДАЛЕНИЕ ДОКУМЕНТА ==========
        window.deleteDocumentById = async function(id, buttonElement) {
            if (!confirm(`Вы уверены, что хотите удалить документ ID: ${id} из базы?`)) return;

            try {
                const response = await fetch(`/documents/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    const row = buttonElement.closest('tr');
                    row.remove();
                } else {
                    alert("Бэкенд отклонил удаление документа.");
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка при отправке DELETE-запроса.");
            }
        };

        // ========== ЗАГЛУШКА ЭКСПОРТА ==========
        window.triggerExport = function(format) {
            alert(`Формирование выгрузки данных таблицы в формат ${format}. Файл будет загружен автоматически.`);
        };

        // ========== ПРИВЯЗКА КНОПОК ==========
        searchBtn.addEventListener('click', executeFastAPISearch);

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBtn.click();
            }
        });

        // ========== ПРОВЕРКА ЗДОРОВЬЯ ==========
        async function checkHealth() {
            try {
                const resp = await fetch('/health');
                if (resp.ok) {
                    statusLed.className = 'status-indicator online';
                    latencyBadge.textContent = 'API: Доступен';
                } else {
                    statusLed.className = 'status-indicator warning';
                    latencyBadge.textContent = 'API: Ошибка';
                }
            } catch (e) {
                console.warn('Бэкенд недоступен');
                statusLed.className = 'status-indicator offline';
                latencyBadge.textContent = 'API: Offline';
            }
        }
        checkHealth();

        // Автозапуск, если есть значение в поле
        if (searchInput.value.trim()) {
            setTimeout(() => searchBtn.click(), 400);
        }
    })();
</script>

</body>
</html>
